name: ci

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Create virtual environment
        run: uv venv

      - name: Install project and development dependencies
        run: uv pip install --python .venv/bin/python -e ".[dev]"

      - name: Run file-hygiene hooks
        run: |
          source .venv/bin/activate
          SKIP=ruff,ruff-format pre-commit run --all-files --hook-stage pre-commit

      - name: Run deterministic verification
        run: bash scripts/verify.sh
